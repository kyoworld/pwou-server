<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PWOU — LIVE FEED</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; color:#fff; font-family:'Courier New',monospace; padding:20px; }
h1 { font-size:12px; letter-spacing:4px; opacity:0.5; margin-bottom:4px; }
h2 { font-size:10px; letter-spacing:2px; opacity:0.3; margin-bottom:30px; }
table { width:100%; border-collapse:collapse; font-size:12px; }
th { text-align:left; padding:8px 12px; opacity:0.4; letter-spacing:2px; font-size:10px; border-bottom:1px solid #222; }
td { padding:10px 12px; border-bottom:1px solid #111; vertical-align:top; }
tr:hover td { background:#0a0a0a; }
.country { opacity:0.6; }
.coord { opacity:0.4; font-size:10px; }
.time { opacity:0.4; font-size:10px; white-space:nowrap; }
.desc { max-width:400px; line-height:1.5; }
.blink { animation: blink 1s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
.live { font-size:10px; letter-spacing:3px; color:#fff; opacity:0.6; margin-bottom:20px; }
</style>
</head>
<body>
<h1>PARALLEL WORLD OBSERVATION UNIT</h1>
<h2>REAL-TIME CHANNEL SHIFT LOG</h2>
<div style="margin-bottom:24px;">
    <a href="/" style="font-family:'Courier New',monospace;font-size:10px;letter-spacing:2px;color:#fff;opacity:0.4;text-decoration:none;">← HOME</a>
  </div>
<div class="live">● <span class="blink">LIVE</span> — AUTO REFRESH 5s</div>
<table>
<thead>
<tr>
  <th>NO</th>
  <th>TIME</th>
  <th>REGION</th>
  <th>COORD</th>
  <th>ANOMALY</th>
</tr>
</thead>
<tbody id="feed"></tbody>
</table>
<script>
async function load() {
  const res = await fetch('/api/submissions');
  const json = await res.json();
  const tbody = document.getElementById('feed');
  tbody.innerHTML = json.data.map(r => `
    <tr>
      <td class="country">${String(r.id).padStart(4,'0')}</td>
      <td class="time">${r.timestamp || '-'}</td>
      <td class="country">${(r.country || 'UNKNOWN').toUpperCase()}</td>
      <td class="coord">${r.latitude ? r.latitude.toFixed(4)+' / '+r.longitude.toFixed(4) : '-'}</td>
      <td class="desc">${r.description}</td>
    </tr>
  `).join('');
}
load();
setInterval(load, 5000);
</script>
</body>
</html>
