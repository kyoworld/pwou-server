<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PARALLEL WORLD OBSERVATION UNIT</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#000; color:#fff;
  font-family:'Courier New',monospace;
  min-height:100vh;
  display:flex; flex-direction:column; align-items:center;
  padding:88px 20px 80px;
}

.header { text-align:center; margin-bottom:48px; }
.header h1 { font-size:10px; letter-spacing:4px; opacity:.4; margin-bottom:6px; }
.header h2 { font-size:9px; letter-spacing:3px; opacity:.25; }

/* ── 프린터 본체 ── */
.printer-wrap {
  position: relative;
  width: 300px;
  z-index: 10; /* 영수증보다 위에 위치 */
}

.printer-body {
  width: 300px;
  height: 200px; /* 높이 조정 */
  background: #EDE8DF;
  border-radius: 10px 10px 4px 4px;
  position: relative;
  box-shadow:
    6px 0 0 #D8D2C8,
    0 8px 0 #CCC6BC,
    6px 8px 0 #C2BCB2,
    8px 16px 32px rgba(0,0,0,0.7),
    inset 0 1px 0 rgba(255,255,255,0.8);
}

/* 슬롯 (실제로 영수증이 나오는 구멍) */
.printer-slot {
  position: absolute;
  bottom: 20px; /* 하단으로 배치 */
  left: 50%;
  transform: translateX(-50%);
  width: 70%;
  height: 8px;
  background: #1A1714;
  border-radius: 2px;
  box-shadow: inset 0 2px 4px rgba(0,0,0,0.8);
  z-index: 20;
}

/* ── 영수증 출력 영역 ── */
.receipt-container {
  width: 300px;
  height: 400px; /* 고정 높이로 스크롤 가능하게 설정 */
  overflow-y: auto;
  margin-top: -30px; /* 프린터 슬롯과 겹치도록 */
  padding: 40px 0 100px;
  display: flex;
  flex-direction: column;
  align-items: center;
  mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent);
  -webkit-mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent);
  scrollbar-width: none; /* 파이어폭스 */
}
.receipt-container::-webkit-scrollbar { display: none; } /* 크롬/사파리 */

.receipt-tape {
  width: 65%;
  display: flex;
  flex-direction: column; /* 시간순 (위에서 아래로) */
  gap: 0;
}

.receipt-entry {
  padding: 15px 12px;
  background: #fff;
  border-bottom: 1px dashed #ccc;
  animation: feedIn 0.6s ease-out forwards;
  box-shadow: 2px 0 5px rgba(0,0,0,0.1);
}

@keyframes feedIn {
  from { transform: translateY(-20px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.e-divider { font-size: 9px; color: #bbb; margin: 5px 0; overflow: hidden; white-space: nowrap; }
.e-title { font-size: 8px; letter-spacing: 1px; color: #999; margin: 5px 0; font-weight: bold; }
.e-line { font-size: 9px; color: #333; line-height: 1.5; word-break: break-all; }
.e-bold { font-size: 10px; color: #000; font-weight: bold; margin-bottom: 4px; }

/* ── Form ── */
.form-section { width:100%; max-width:300px; margin-top: 20px; }
textarea {
  width:100%; background:#0b0b0b; border:1px solid #1e1e1e;
  color:#fff; font-family:inherit; font-size:12px; padding:12px; resize:none; outline:none;
}
.btn-primary {
  width:100%; background:#fff; color:#000; border:none; padding:12px; cursor:pointer; font-weight:bold; margin-top:10px;
}
.btn-primary:disabled { opacity: .2; }

/* Ticker & Overlay (기존 스타일 유지) */
#ticker-bar { position: fixed; top: 0; width: 100%; height: 28px; background: #0c0c0c; display: flex; align-items: center; z-index: 500; border-bottom: 1px solid #1c1c1c; }
.ticker-track { display: flex; animation: tickerScroll linear infinite; }
@keyframes tickerScroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }
</style>
</head>
<body>

<div id="ticker-bar">
  <div style="color:red; font-size:8px; padding:0 10px;">● LIVE</div>
  <div class="ticker-track" id="ticker-track"><span id="ticker-a"></span><span id="ticker-b"></span></div>
</div>

<div class="header">
  <h1>PARALLEL WORLD OBSERVATION UNIT</h1>
  <h2>SIGNAL SUBMISSION TERMINAL</h2>
</div>

<div class="printer-wrap">
  <div class="printer-body">
    <div class="printer-slot"></div>
    <!-- 브랜드 표기 제거됨 -->
  </div>
</div>

<!-- 영수증이 출력되어 내려오는 박스 (스크롤 가능) -->
<div class="receipt-container" id="receipt-container">
  <div class="receipt-tape" id="receipt">
    <!-- 기록들이 여기 쌓입니다 -->
  </div>
</div>

<div class="form-section">
  <textarea id="desc" rows="3" placeholder="이상 현상 기술..."></textarea>
  <div id="status" style="font-size:10px; opacity:0.5; margin:10px 0;">GPS 연동 대기 중...</div>
  <button class="btn-primary" id="btn" onclick="submitReport()" disabled>TRANSMIT SIGNAL</button>
</div>

<script>
let userLat = null, userLon = null, userCountry = null;
const knownIds = new Set();

function makeEntry(r) {
  const div = document.createElement('div');
  div.className = 'receipt-entry';
  const time = r.timestamp || new Date().toLocaleString();
  const coord = r.latitude ? `${r.latitude.toFixed(3)}, ${r.longitude.toFixed(3)}` : 'UNKNOWN';
  
  div.innerHTML = `
    <div class="e-divider">--------------------------------</div>
    <div class="e-bold">LOG: ${r.id || 'NEW'}</div>
    <div class="e-line">TIME: ${time}</div>
    <div class="e-line">LOC: ${r.country || 'UNKNOWN'} (${coord})</div>
    <div class="e-title">-- DESCRIPTION --</div>
    <div class="e-line">${r.description}</div>
    <div class="e-divider">--------------------------------</div>
  `;
  return div;
}

async function poll() {
  try {
    const res = await fetch('/api/submissions');
    const json = await res.json();
    const data = json.data || [];
    const tape = document.getElementById('receipt');
    const container = document.getElementById('receipt-container');
    
    // 시간순(과거->최신)으로 보여주기 위해 정렬 후 추가
    data.sort((a, b) => a.id - b.id).forEach(r => {
      if (!knownIds.has(r.id)) {
        knownIds.add(r.id);
        tape.appendChild(makeEntry(r));
        // 새 로그가 나오면 아래로 자동 스크롤
        container.scrollTop = container.scrollHeight;
      }
    });
  } catch(e) {}
}

async function submitReport() {
  const desc = document.getElementById('desc').value.trim();
  if(!desc) return;
  
  document.getElementById('btn').disabled = true;
  try {
    await fetch('/submit', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ description: desc, latitude: userLat, longitude: userLon, country: userCountry })
    });
    document.getElementById('desc').value = '';
    poll();
  } catch(e) { alert('전송 실패'); }
  document.getElementById('btn').disabled = false;
}

// 위치 정보 로직
navigator.geolocation.getCurrentPosition(pos => {
  userLat = pos.coords.latitude;
  userLon = pos.coords.longitude;
  document.getElementById('status').innerText = `READY: ${userLat.toFixed(2)}, ${userLon.toFixed(2)}`;
  document.getElementById('btn').disabled = false;
}, () => {
  document.getElementById('status').innerText = "위치 정보 거부됨 (제한적 전송)";
  document.getElementById('btn').disabled = false;
});

setInterval(poll, 2000);
poll();
</script>
</body>
</html>
