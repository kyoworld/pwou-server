<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PARALLEL WORLD OBSERVATION UNIT</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; color:#fff; font-family:'Courier New',monospace; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; }
h1 { font-size:13px; letter-spacing:3px; margin-bottom:8px; opacity:0.6; text-align:center; }
h2 { font-size:10px; letter-spacing:2px; margin-bottom:40px; opacity:0.4; text-align:center; }
.form { width:100%; max-width:420px; }
label { font-size:11px; letter-spacing:2px; opacity:0.5; display:block; margin-bottom:6px; }
textarea { width:100%; background:#111; border:1px solid #333; color:#fff; font-family:'Courier New',monospace; font-size:13px; padding:12px; resize:none; margin-bottom:24px; outline:none; }
textarea:focus { border-color:#fff; }
.status { font-size:11px; opacity:0.4; margin-bottom:24px; min-height:16px; line-height:1.6; }
button { background:#fff; color:#000; border:none; font-family:'Courier New',monospace; font-size:12px; letter-spacing:3px; padding:12px 32px; cursor:pointer; width:100%; margin-bottom:12px; }
button:disabled { opacity:0.3; cursor:not-allowed; }
.btn-secondary { background:none; color:#fff; border:1px solid #333; opacity:0.5; }
.btn-secondary:hover { opacity:1; border-color:#fff; }
.success { color:#fff; opacity:1 !important; }
.error { color:#f55; opacity:1 !important; }
#location-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:#000; display:flex; align-items:center; justify-content:center; z-index:100; padding:30px; }
.overlay-inner { max-width:380px; width:100%; text-align:center; }
.overlay-inner h3 { font-size:12px; letter-spacing:3px; margin-bottom:30px; opacity:0.6; }
.overlay-inner p { font-size:11px; line-height:1.8; opacity:0.5; margin-bottom:12px; }
.overlay-inner .highlight { opacity:0.8; margin-bottom:30px; }
.overlay-inner button { margin-bottom:10px; }
.divider { border:none; border-top:1px solid #1a1a1a; margin:24px 0; }
</style>
</head>
<body>

<div id="location-overlay" style="display:none;">
  <div class="overlay-inner">
    <h3>SIGNAL ACQUISITION</h3>
    <p>본 장치는 차원 이탈 현상을 정확히 기록하기 위해<br>제보자의 <strong style="opacity:1">위치 좌표</strong>가 필요합니다.</p>
    <hr class="divider">
    <p class="highlight">
      수집 항목: GPS 좌표, 국가 정보<br>
      수집하지 않는 항목: IP, 이름, 기기정보<br>
      모든 제보는 완전 익명으로 처리됩니다.
    </p>
    <button onclick="requestLocation()">위치 정보 허용 — 제보 시작</button>
    <button class="btn-secondary" onclick="goToBoard()">거부 — 현황 확인만</button>
  </div>
</div>

<h1>PARALLEL WORLD OBSERVATION UNIT</h1>
<h2>SIGNAL SUBMISSION TERMINAL</h2>
<div class="form">
  <label>ANOMALY DESCRIPTION</label>
  <textarea id="desc" rows="5" placeholder="목격한 이상 현상을 기술하세요&#10;Describe the anomaly you witnessed..."></textarea>
  <div class="status" id="status">ACQUIRING COORDINATES...</div>
  <button id="btn" onclick="submitReport()" disabled>TRANSMIT SIGNAL</button>
  <button class="btn-secondary" onclick="location.href='/board'">LIVE FEED →</button>
</div>

<script>
const SERVER = '';
let userLat = null, userLon = null, userCountry = null;

function goToBoard() {
  window.location.replace('/board');
}

function requestLocation() {
  navigator.geolocation.getCurrentPosition(async function(pos) {
    userLat = pos.coords.latitude;
    userLon = pos.coords.longitude;
    userCountry = await getCountryFromCoords(userLat, userLon);
    document.getElementById('status').textContent = 'COORD: ' + userLat.toFixed(4) + ' / ' + userLon.toFixed(4) + ' — ' + userCountry.toUpperCase();
    document.getElementById('btn').disabled = false;
    document.getElementById('location-overlay').style.display = 'none';
  }, function() {
    goToBoard();
  });
}

function getCountryFromCoords(lat, lon) {
  return fetch('https://nominatim.openstreetmap.org/reverse?lat=' + lat + '&lon=' + lon + '&format=json')
    .then(r => r.json()).then(d => d.address && d.address.country ? d.address.country : 'UNKNOWN').catch(() => 'UNKNOWN');
}

function initLocation() {
  if (!navigator.geolocation) {
    goToBoard();
    return;
  }
  navigator.permissions.query({ name: 'geolocation' }).then(function(result) {
    if (result.state === 'granted') {
      navigator.geolocation.getCurrentPosition(async function(pos) {
        userLat = pos.coords.latitude;
        userLon = pos.coords.longitude;
        userCountry = await getCountryFromCoords(userLat, userLon);
        document.getElementById('status').textContent = 'COORD: ' + userLat.toFixed(4) + ' / ' + userLon.toFixed(4) + ' — ' + userCountry.toUpperCase();
        document.getElementById('btn').disabled = false;
      });
    } else if (result.state === 'denied') {
      goToBoard();
    } else {
      document.getElementById('location-overlay').style.display = 'flex';
    }
  }).catch(function() {
    document.getElementById('location-overlay').style.display = 'flex';
  });
}

window.addEventListener('pageshow', function() {
  initLocation();
});

async function submitReport() {
  var desc = document.getElementById('desc').value.trim();
  if (!desc) return;

  if (desc === 'pwou2026') {
    window.location.href = '/admin';
    return;
  }

  document.getElementById('btn').disabled = true;
  document.getElementById('status').textContent = 'TRANSMITTING...';
  try {
    await fetch(SERVER + '/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ description: desc, latitude: userLat, longitude: userLon, country: userCountry })
    });
    document.getElementById('status').className = 'status success';
    document.getElementById('status').textContent = 'SIGNAL RECORDED. RECEIPT PENDING.';
    document.getElementById('desc').value = '';
    setTimeout(function() {
      document.getElementById('btn').disabled = false;
      document.getElementById('status').className = 'status';
      document.getElementById('status').textContent = 'COORD: ' + userLat.toFixed(4) + ' / ' + userLon.toFixed(4) + ' — ' + userCountry.toUpperCase();
    }, 3000);
  } catch(e) {
    document.getElementById('status').className = 'status error';
    document.getElementById('status').textContent = 'TRANSMISSION FAILED. RETRY.';
    document.getElementById('btn').disabled = false;
  }
}
</script>
</body>
</html>
