<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PARALLEL WORLD OBSERVATION UNIT</title>
<style>
:root {
  --printer-w: 380px;
  --upper-h: 52px;   /* printer face + slot height */
  --lower-h: 34px;   /* printer body below slot */
  --zone-h:  320px;  /* visible receipt length */
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#000; color:#fff;
  font-family:'Courier New',monospace;
  min-height:100vh;
  display:flex; flex-direction:column; align-items:center;
  padding:48px 20px 60px;
}

.header { text-align:center; margin-bottom:36px; }
.header h1 { font-size:10px; letter-spacing:4px; opacity:.4; margin-bottom:6px; }
.header h2 { font-size:9px; letter-spacing:3px; opacity:.25; }

/* ────────────────────────────────────────────────
   Printer scene
   Layer 1 (z:1) — printer-lower  — white body behind receipt
   Layer 2 (z:2) — receipt-zone   — tape hangs from slot downward
   Layer 3 (z:3) — printer-upper  — face + slot, sits over top of tape
──────────────────────────────────────────────── */
.printer-scene {
  position: relative;
  width: 100%;
  max-width: var(--printer-w);
  /* height = upper + zone (tape can extend below, body scroll handles page) */
  height: calc(var(--upper-h) + var(--zone-h));
  margin-bottom: 32px;
}

/* Layer 3 — printer top face, covers tape above slot */
.printer-upper {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: var(--upper-h);
  background: #f5f5f5;
  border-radius: 6px 6px 0 0;
  padding: 13px 18px 0;
  z-index: 3;
  box-shadow:
    inset 0 1px 0 #fff,
    0 -2px 16px rgba(255,255,255,.05);
}
.printer-face {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 9px;
}
.printer-brand { font-size:8px; letter-spacing:3px; color:#aaa; }
.leds { display:flex; gap:8px; align-items:center; }
.led {
  width:7px; height:7px; border-radius:50%;
}
.led.amber {
  background:#c08020;
  box-shadow: 0 0 4px #c08020, inset 0 1px 1px rgba(255,220,100,.4);
}
.led.green {
  background:#28a848;
  box-shadow: 0 0 5px #28a848, inset 0 1px 1px rgba(100,255,140,.4);
  animation: blink 2s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

.printer-slot {
  height: 5px;
  background: #111;
  border-radius: 1px;
  box-shadow:
    inset 0 2px 5px #000,
    inset 0 -1px 2px #333,
    0 1px 0 #d0d0d0;
  margin: 0 -18px;
}

/* Layer 1 — printer body below slot (behind the tape) */
.printer-lower {
  position: absolute;
  top: var(--upper-h);
  left: 0; right: 0;
  height: var(--lower-h);
  background: #f5f5f5;
  border-radius: 0 0 6px 6px;
  z-index: 1;
  box-shadow: 0 12px 40px rgba(255,255,255,.06);
}

/* Layer 2 — receipt zone: tape exits slot and hangs down */
.receipt-zone {
  position: absolute;
  top: var(--upper-h);
  left: 50%;
  transform: translateX(-50%);
  width: 82%;
  height: var(--zone-h);
  overflow: hidden;
  z-index: 2;
}

.receipt-tape {
  width: 100%;
  background: #fff;
  display: flex;
  flex-direction: column;
  transform-origin: top center;
  /* sway: paper hanging from slot gently swinging */
  animation: sway 5s ease-in-out infinite;
  /* smooth feed when new entry arrives */
  transition: margin-top 0.55s cubic-bezier(0.33, 1, 0.68, 1);
  box-shadow: 2px 4px 18px rgba(0,0,0,.45), -1px 0 6px rgba(0,0,0,.15);
}

@keyframes sway {
  0%   { transform: rotate(-0.5deg) translateX(-0.5px); }
  20%  { transform: rotate(0.2deg)  translateX(0.3px); }
  50%  { transform: rotate(0.55deg) translateX(0.6px); }
  80%  { transform: rotate(0.1deg)  translateX(0.2px); }
  100% { transform: rotate(-0.5deg) translateX(-0.5px); }
}

/* Receipt paper entries */
.receipt-entry {
  padding: 8px 13px;
  border-bottom: 1px dashed #ddd;
  flex-shrink: 0;
  animation: feedIn 0.38s ease-out;
}
.receipt-entry:last-child { border-bottom: none; }

@keyframes feedIn {
  from { opacity:0; transform:translateY(-10px) scaleY(0.6); transform-origin:top; }
  to   { opacity:1; transform:translateY(0)     scaleY(1); }
}

.e-num  { font-size:8px; color:#bbb; letter-spacing:1px; margin-bottom:1px; }
.e-meta { font-size:9px; color:#888; margin-bottom:3px; line-height:1.45; }
.e-desc { font-size:11px; color:#111; line-height:1.55; }

/* ── Form ── */
.form-section { width:100%; max-width:var(--printer-w); }

label { font-size:10px; letter-spacing:2px; opacity:.4; display:block; margin-bottom:6px; }
textarea {
  width:100%; background:#0b0b0b; border:1px solid #1e1e1e;
  color:#fff; font-family:'Courier New',monospace;
  font-size:12px; padding:11px; resize:none; margin-bottom:14px;
  outline:none; line-height:1.6;
}
textarea:focus { border-color:#333; }
.status { font-size:10px; opacity:.4; margin-bottom:14px; min-height:15px; line-height:1.6; }
.status.success { color:#fff; opacity:1; }
.status.error   { color:#f55; opacity:1; }
.btn-primary {
  width:100%; background:#fff; color:#000; border:none;
  font-family:'Courier New',monospace; font-size:11px;
  letter-spacing:3px; padding:12px; cursor:pointer; margin-bottom:8px;
}
.btn-primary:disabled { opacity:.2; cursor:not-allowed; }
.btn-secondary {
  width:100%; background:none; color:#fff; border:1px solid #1c1c1c;
  font-family:'Courier New',monospace; font-size:10px;
  letter-spacing:2px; padding:10px; cursor:pointer; opacity:.4;
}
.btn-secondary:hover { opacity:.8; border-color:#333; }

/* ── Overlay ── */
#location-overlay {
  position:fixed; inset:0; background:#000;
  display:flex; align-items:center; justify-content:center;
  z-index:100; padding:30px;
}
.overlay-inner { max-width:340px; width:100%; text-align:center; }
.overlay-inner h3 { font-size:11px; letter-spacing:3px; opacity:.6; margin-bottom:26px; }
.overlay-inner p  { font-size:10px; line-height:1.8; opacity:.45; margin-bottom:8px; }
.overlay-inner .hl { opacity:.75; margin-bottom:26px; }
.overlay-inner .btn-primary { margin-bottom:8px; }
hr.div { border:none; border-top:1px solid #1a1a1a; margin:18px 0; }

.toast {
  position:fixed; bottom:28px; left:50%; transform:translateX(-50%);
  background:#fff; color:#000; font-family:'Courier New',monospace;
  font-size:10px; letter-spacing:2px; padding:10px 22px;
  opacity:0; transition:opacity .3s; pointer-events:none; z-index:200;
}
.toast.show { opacity:1; }

@media (max-width:440px) {
  body { padding:28px 14px 50px; }
  :root { --printer-w:100%; --zone-h:260px; }
}

/* ── Printer box object ── */
.printer-box {
  width: 280px;
  background: #F5F0E8;
  border-radius: 16px;
  padding: 28px 24px 22px;
  margin-bottom: 40px;
  position: relative;
  box-shadow:
    0 1px 0 rgba(255,255,255,0.9) inset,          /* top inner highlight */
    0 -1px 0 rgba(0,0,0,0.12) inset,               /* bottom inner shadow */
    0 4px 0 #D9D2C2,                               /* bottom face */
    0 5px 0 #CCC5B4,
    0 6px 0 #BFB8A6,
    4px 8px 0 #B8B0A0,                             /* right-bottom corner */
    0 10px 28px rgba(0,0,0,0.55),                  /* ambient shadow */
    0 2px 8px rgba(0,0,0,0.3);
}
.printer-box-slot {
  width: 70%;
  height: 8px;
  background: #1A1714;
  border-radius: 4px;
  margin: 0 auto;
  box-shadow:
    inset 0 3px 6px rgba(0,0,0,0.85),
    inset 0 1px 2px rgba(0,0,0,0.6),
    0 1px 0 rgba(255,255,255,0.35);
}
.printer-box-face {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 16px;
}
.printer-box-brand {
  font-size: 7px;
  letter-spacing: 3px;
  color: #A09880;
  font-family: 'Courier New', monospace;
}
.printer-box-leds {
  display: flex;
  gap: 7px;
  align-items: center;
}
.printer-box-led {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #C8C0B0;
  box-shadow: inset 0 1px 2px rgba(0,0,0,0.25);
}
.printer-box-led.on {
  background: #6DBF7E;
  box-shadow:
    0 0 5px rgba(109,191,126,0.8),
    0 0 10px rgba(109,191,126,0.4),
    inset 0 1px 1px rgba(255,255,255,0.4);
}
@media (max-width:440px) {
  .printer-box { width: 90vw; }
}
</style>
</head>
<body>

<div id="location-overlay" style="display:none;">
  <div class="overlay-inner">
    <h3>SIGNAL ACQUISITION</h3>
    <p>본 장치는 차원 이탈 현상을 정확히 기록하기 위해<br>제보자의 <strong style="opacity:1">위치 좌표</strong>가 필요합니다.</p>
    <hr class="div">
    <p class="hl">수집 항목: GPS 좌표, 국가 정보<br>
    수집하지 않는 항목: IP, 이름, 기기정보<br>
    모든 제보는 완전 익명으로 처리됩니다.</p>
    <button class="btn-primary" onclick="requestLocation()">위치 정보 허용 — 제보 시작</button>
    <button class="btn-secondary" onclick="goToBoard()">거부 — 현황 확인만</button>
  </div>
</div>

<div class="printer-box">
  <div class="printer-box-slot"></div>
  <div class="printer-box-face">
    <span class="printer-box-brand">PWOU — 01</span>
    <div class="printer-box-leds">
      <div class="printer-box-led"></div>
      <div class="printer-box-led on"></div>
    </div>
  </div>
</div>

<div class="header">
  <h1>PARALLEL WORLD OBSERVATION UNIT</h1>
  <h2>SIGNAL SUBMISSION TERMINAL</h2>
</div>

<div class="printer-scene">
  <!-- z:1 — printer lower body, sits behind the tape -->
  <div class="printer-lower"></div>

  <!-- z:2 — receipt tape exits slot and hangs down -->
  <div class="receipt-zone" id="receipt-zone">
    <div class="receipt-tape" id="receipt"></div>
  </div>

  <!-- z:3 — printer face + slot, visually sits above/over the tape top -->
  <div class="printer-upper">
    <div class="printer-face">
      <span class="printer-brand">PWOU — 01</span>
      <div class="leds">
        <div class="led amber"></div>
        <div class="led green" id="act-led"></div>
      </div>
    </div>
    <div class="printer-slot"></div>
  </div>
</div>

<div class="form-section">
  <label>ANOMALY DESCRIPTION</label>
  <textarea id="desc" rows="4" placeholder="목격한 이상 현상을 기술하세요&#10;Describe the anomaly you witnessed..."></textarea>
  <div class="status" id="status">ACQUIRING COORDINATES...</div>
  <button class="btn-primary" id="btn" onclick="submitReport()" disabled>TRANSMIT SIGNAL</button>
  <button class="btn-secondary" onclick="location.href='/board'">LIVE FEED →</button>
</div>
<div class="toast" id="toast">SIGNAL RECORDED</div>

<script>
const SERVER = '';
let userLat = null, userLon = null, userCountry = null;
const knownIds = new Set();

// ── Receipt feed ───────────────────────────────────────────────

function makeEntry(r) {
  const div = document.createElement('div');
  div.className = 'receipt-entry';
  const coord = r.latitude != null
    ? r.latitude.toFixed(3) + ' / ' + r.longitude.toFixed(3)
    : '—';
  div.innerHTML =
    '<div class="e-num">#' + String(r.id).padStart(4, '0') + '</div>' +
    '<div class="e-meta">' +
      (r.timestamp || '—') + '&nbsp;&nbsp;·&nbsp;&nbsp;' +
      (r.country || 'UNKNOWN').toUpperCase() + '&nbsp;&nbsp;·&nbsp;&nbsp;' +
      coord +
    '</div>' +
    '<div class="e-desc">' + r.description + '</div>';
  return div;
}

// Scroll the tape up so the newest (bottom) entry is always visible
function feedScroll() {
  const zone = document.getElementById('receipt-zone');
  const tape = document.getElementById('receipt');
  const excess = tape.scrollHeight - zone.clientHeight;
  tape.style.marginTop = excess > 0 ? (-excess) + 'px' : '0';
}

async function poll() {
  try {
    const json = await fetch('/api/submissions').then(r => r.json());
    const entries = [...(json.data || [])].reverse(); // oldest → newest
    const tape = document.getElementById('receipt');
    let added = false;
    for (const r of entries) {
      if (!knownIds.has(r.id)) {
        knownIds.add(r.id);
        tape.appendChild(makeEntry(r));
        added = true;
      }
    }
    if (added) {
      // Wait a tick so browser calculates new scrollHeight before scrolling
      requestAnimationFrame(feedScroll);
      flashLed();
    }
  } catch (e) {}
}

function flashLed() {
  const led = document.getElementById('act-led');
  led.style.background = '#00ff55';
  led.style.boxShadow = '0 0 10px #00ff55';
  setTimeout(() => { led.style.background = ''; led.style.boxShadow = ''; }, 200);
}

poll();
setInterval(poll, 1000);

// ── Location ───────────────────────────────────────────────────

function goToBoard() { window.location.replace('/board'); }

function getCountryFromCoords(lat, lon) {
  return fetch(
    'https://nominatim.openstreetmap.org/reverse?lat=' + lat + '&lon=' + lon + '&format=json',
    { headers: { 'Accept-Language': 'en' } }
  ).then(r => r.json())
   .then(d => d.address && d.address.country ? d.address.country : 'UNKNOWN')
   .catch(() => 'UNKNOWN');
}

function setCoordStatus() {
  document.getElementById('status').className = 'status';
  document.getElementById('status').textContent =
    'COORD: ' + userLat.toFixed(4) + ' / ' + userLon.toFixed(4) + ' — ' + userCountry.toUpperCase();
}

function requestLocation() {
  navigator.geolocation.getCurrentPosition(async function(pos) {
    userLat = pos.coords.latitude;
    userLon = pos.coords.longitude;
    userCountry = await getCountryFromCoords(userLat, userLon);
    setCoordStatus();
    document.getElementById('btn').disabled = false;
    document.getElementById('location-overlay').style.display = 'none';
  }, goToBoard);
}

function initLocation() {
  if (!navigator.geolocation) { goToBoard(); return; }
  navigator.permissions.query({ name: 'geolocation' }).then(function(result) {
    if (result.state === 'granted') {
      navigator.geolocation.getCurrentPosition(async function(pos) {
        userLat = pos.coords.latitude;
        userLon = pos.coords.longitude;
        userCountry = await getCountryFromCoords(userLat, userLon);
        setCoordStatus();
        document.getElementById('btn').disabled = false;
      });
    } else if (result.state === 'denied') {
      goToBoard();
    } else {
      document.getElementById('location-overlay').style.display = 'flex';
    }
  }).catch(function() {
    document.getElementById('location-overlay').style.display = 'flex';
  });
}

window.addEventListener('pageshow', initLocation);

// ── Submit ─────────────────────────────────────────────────────

async function submitReport() {
  const desc = document.getElementById('desc').value.trim();
  if (!desc) return;
  if (desc === 'pwou2026') { window.location.href = '/admin'; return; }
  document.getElementById('btn').disabled = true;
  document.getElementById('status').textContent = 'TRANSMITTING...';
  try {
    await fetch(SERVER + '/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ description: desc, latitude: userLat, longitude: userLon, country: userCountry })
    });
    document.getElementById('status').className = 'status success';
    document.getElementById('status').textContent = 'SIGNAL RECORDED. RECEIPT PENDING.';
    document.getElementById('desc').value = '';
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
    setTimeout(() => {
      document.getElementById('btn').disabled = false;
      setCoordStatus();
    }, 3000);
  } catch (e) {
    document.getElementById('status').className = 'status error';
    document.getElementById('status').textContent = 'TRANSMISSION FAILED. RETRY.';
    document.getElementById('btn').disabled = false;
  }
}
</script>
</body>
</html>
