<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; color:#fff; font-family:'Courier New',monospace; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; }
h1 { font-size:13px; letter-spacing:3px; margin-bottom:8px; opacity:0.6; text-align:center; }
h2 { font-size:10px; letter-spacing:2px; margin-bottom:40px; opacity:0.4; text-align:center; }

label { font-size:11px; letter-spacing:2px; opacity:0.5; display:block; margin-bottom:6px; }

button:disabled { opacity:0.3; cursor:not-allowed; }
.btn-secondary { background:none; color:#fff; border:1px solid #333; opacity:0.5; }
.btn-secondary:hover { opacity:1; border-color:#fff; }
.success { color:#fff; opacity:1 !important; }
.error { color:#f55; opacity:1 !important; }

/* 위치동의 오버레이 */
#location-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:#000; display:flex; align-items:center; justify-content:center; z-index:100; padding:30px; }
.overlay-inner { max-width:380px; width:100%; text-align:center; }
.overlay-inner h3 { font-size:12px; letter-spacing:3px; margin-bottom:30px; opacity:0.6; }
.overlay-inner p { font-size:11px; line-height:1.8; opacity:0.5; margin-bottom:12px; }
.overlay-inner .highlight { opacity:0.8; margin-bottom:30px; }

.divider { border:none; border-top:1px solid #1a1a1a; margin:30px 0; }
</style>
</head>

  </div>
</div>

  <button id="btn" onclick="submitReport()" disabled>TRANSMIT SIGNAL</button>

</div>

<script>
const SERVER = '';
let userLat = null, userLon = null, userCountry = null;

function requestLocation() {
  navigator.geolocation.getCurrentPosition(async function(pos) {
    userLat = pos.coords.latitude;
    userLon = pos.coords.longitude;
    userCountry = await getCountryFromCoords(userLat, userLon);
    document.getElementById('status').textContent = 'COORD: ' + userLat.toFixed(4) + ' / ' + userLon.toFixed(4) + ' — ' + userCountry.toUpperCase();
    document.getElementById('btn').disabled = false;
    document.getElementById('location-overlay').style.display = 'none';
  }, function() {
    alert('위치 접근이 거부되었습니다. 브라우저 설정에서 위치를 허용해주세요.');
  });
}

function denyLocation() {
  document.getElementById('location-overlay').style.display = 'none';
  document.getElementById('status').textContent = 'LOCATION DENIED — TRANSMISSION BLOCKED';
  document.getElementById('btn').disabled = true;
}
