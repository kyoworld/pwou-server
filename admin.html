<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PWOU — ADMIN</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; color:#fff; font-family:'Courier New',monospace; padding:20px; }
h1 { font-size:12px; letter-spacing:4px; opacity:0.5; margin-bottom:16px; }
.nav { margin-bottom:30px; }
.nav a { font-family:'Courier New',monospace; font-size:10px; letter-spacing:2px; color:#fff; opacity:0.4; text-decoration:none; margin-right:24px; }
.nav a:hover { opacity:1; }
.login { max-width:300px; margin:100px auto; text-align:center; }
.login input { width:100%; background:#111; border:1px solid #333; color:#fff; font-family:'Courier New',monospace; padding:10px; margin-bottom:16px; outline:none; letter-spacing:3px; text-align:center; }
.login button { width:100%; background:#fff; color:#000; border:none; font-family:'Courier New',monospace; padding:10px; cursor:pointer; letter-spacing:3px; }
.tabs { display:flex; gap:20px; margin-bottom:24px; }
.tab { font-size:11px; letter-spacing:2px; opacity:0.4; cursor:pointer; padding-bottom:4px; }
.tab.active { opacity:1; border-bottom:1px solid #fff; }
table { width:100%; border-collapse:collapse; font-size:11px; }
th { text-align:left; padding:8px 10px; opacity:0.4; letter-spacing:2px; font-size:10px; border-bottom:1px solid #222; }
td { padding:8px 10px; border-bottom:1px solid #111; vertical-align:top; }
.done { opacity:0.3; }
.hidden-row { opacity:0.2; }
.pending { color:#fff; }
#login-screen { display:block; }
#admin-screen { display:none; }
.stats { display:flex; gap:40px; margin-bottom:30px; flex-wrap:wrap; }
.stat-item { font-size:11px; opacity:0.5; }
.stat-item span { display:block; font-size:24px; opacity:1; color:#fff; margin-bottom:4px; }
.action-btn { background:none; border:1px solid #444; color:#fff; font-family:'Courier New',monospace; font-size:10px; padding:2px 8px; cursor:pointer; margin-right:4px; margin-bottom:4px; }
.hide-btn { color:#666; }
.hide-btn.active { color:#f55; border-color:#f55; }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login">
    <h1>PWOU ADMIN</h1>
    <input type="password" id="pw" placeholder="PASSWORD" />
    <button onclick="login()">ENTER</button>
    <div id="err" style="margin-top:12px;font-size:10px;opacity:0.4;"></div>
  </div>
</div>

<div id="admin-screen">
  <h1>PWOU — ADMIN PANEL</h1>
  <div class="nav">
    <a href="/">← HOME</a>
    <a href="/board">LIVE FEED →</a>
  </div>
  <div class="stats">
    <div class="stat-item"><span id="total">0</span>TOTAL</div>
    <div class="stat-item"><span id="pending-count">0</span>PENDING</div>
    <div class="stat-item"><span id="printed-count">0</span>PRINTED</div>
    <div class="stat-item"><span id="hidden-count">0</span>HIDDEN</div>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="showTab('all')">ALL</div>
    <div class="tab" onclick="showTab('pending')">PENDING</div>
    <div class="tab" onclick="showTab('printed')">PRINTED</div>
    <div class="tab" onclick="showTab('hidden')">HIDDEN</div>
  </div>
  <table>
    <thead>
      <tr>
        <th>NO</th><th>TIME</th><th>REGION</th><th>COORD</th><th>ANOMALY</th><th>STATUS</th><th>ACTION</th>
      </tr>
    </thead>
    <tbody id="admin-feed"></tbody>
  </table>
</div>

<script>
let allData = [];
let currentTab = 'all';
let savedPw = '';

async function login() {
  const pw = document.getElementById('pw').value;
  const res = await fetch('/api/submissions?pw=' + pw);
  const json = await res.json();
  if (json.auth) {
    savedPw = pw;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-screen').style.display = 'block';
    allData = json.data;
    render();
    setInterval(reload, 5000);
  } else {
    document.getElementById('err').textContent = 'ACCESS DENIED';
  }
}

async function reload() {
  const res = await fetch('/api/submissions?pw=' + savedPw);
  const json = await res.json();
  if (json.auth) { allData = json.data; render(); }
}

async function markPrinted(id) {
  await fetch('/mark_printed/' + id, { method: 'POST' });
  await reload();
}

async function toggleHidden(id) {
  await fetch('/toggle_hidden/' + id, { method: 'POST' });
  await reload();
}

function showTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['all','pending','printed','hidden'][i] === tab);
  });
  render();
}

function render() {
  const pending = allData.filter(r => !r.printed && !r.hidden);
  const printed = allData.filter(r => r.printed);
  const hidden = allData.filter(r => r.hidden);
  document.getElementById('total').textContent = allData.length;
  document.getElementById('pending-count').textContent = pending.length;
  document.getElementById('printed-count').textContent = printed.length;
  document.getElementById('hidden-count').textContent = hidden.length;
  let data = currentTab === 'pending' ? pending : currentTab === 'printed' ? printed : currentTab === 'hidden' ? hidden : allData;
  document.getElementById('admin-feed').innerHTML = data.map(r => `
    <tr class="${r.hidden ? 'hidden-row' : r.printed ? 'done' : ''}">
      <td>${String(r.id).padStart(4,'0')}</td>
      <td>${r.timestamp || '-'}</td>
      <td>${(r.country || 'UNKNOWN').toUpperCase()}</td>
      <td style="font-size:10px;opacity:0.5">${r.latitude ? r.latitude.toFixed(4)+' / '+r.longitude.toFixed(4) : '-'}</td>
      <td>${r.description}</td>
      <td>${r.hidden ? '<span style="color:#f55">HIDDEN</span>' : r.printed ? 'PRINTED' : '<span class="pending">PENDING</span>'}</td>
      <td>
        ${!r.printed && !r.hidden ? '<button class="action-btn" onclick="markPrinted('+r.id+')">DONE</button>' : ''}
        <button class="action-btn hide-btn ${r.hidden ? 'active' : ''}" onclick="toggleHidden('+r.id+')">${r.hidden ? 'UNHIDE' : 'HIDE'}</button>
      </td>
    </tr>
  `).join('');
}

document.getElementById('pw').addEventListener('keydown', e => { if(e.key==='Enter') login(); });
</script>
</body>
</html>
